<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小牛解谜 - 逻辑挑战</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        
        .level-info {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .board-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(10, 50px);
            grid-template-rows: repeat(10, 50px);
            gap: 2px;
            background: #333;
            border: 3px solid #333;
            border-radius: 5px;
        }
        
        .cell {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
            position: relative;
        }
        
        .cell:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        
        .cell.has-cow {
            background: #FFE4B5 !important;
        }
        
        .cell.error {
            animation: shake 0.5s;
            border: 3px solid #ff4444;
        }
        
        .cell.hint {
            animation: pulse 1s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
        }
        
        .cow {
            font-size: 35px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }
        
        .side-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 350px;
        }
        
        .rules {
            margin-bottom: 25px;
        }
        
        .rules h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        .rule-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 12px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .rule-icon {
            font-size: 24px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        
        .rule-text {
            font-size: 14px;
            color: #555;
            line-height: 1.4;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-success {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        
        .btn:active {
            transform: translateY(-1px);
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.5s;
        }
        
        .level-progress {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            z-index: 1000;
            display: none;
        }
        
        .message.show {
            display: block;
            animation: popIn 0.3s;
        }
        
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        .message h2 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .message p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        
        .overlay.show {
            display: block;
        }

        .color-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #666;
        }

        .color-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐄 小牛解谜</h1>
        <div class="level-info">关卡 <span id="current-level">1</span> / 50</div>
    </div>
    
    <div class="game-container">
        <div class="board-section">
            <div id="game-board"></div>
        </div>
        
        <div class="side-panel">
            <div class="level-progress">
                <div>关卡进度</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 2%"></div>
                </div>
                <span id="progress-text">1 / 50</span>
            </div>
            
            <div class="rules">
                <h3>📜 游戏规则</h3>
                <div class="rule-item">
                    <span class="rule-icon">🎨</span>
                    <span class="rule-text"><strong>每种颜色1头牛</strong><br>每个颜色区域必须有且仅有1头小牛</span>
                </div>
                <div class="rule-item">
                    <span class="rule-icon">📏</span>
                    <span class="rule-text"><strong>行列唯一</strong><br>每行、每列只能有1头小牛</span>
                </div>
                <div class="rule-item">
                    <span class="rule-icon">🚫</span>
                    <span class="rule-text"><strong>不能相邻</strong><br>小牛不能在上下左右相邻（斜角可相邻）</span>
                </div>
            </div>
            
            <div class="color-legend" id="color-legend"></div>
            
            <div class="controls">
                <button class="btn btn-secondary" onclick="checkSolution()">
                    ✅ 检查答案
                </button>
                <button class="btn btn-secondary" onclick="clearBoard()">
                    🗑️ 清空棋盘
                </button>
                <button class="btn btn-secondary" onclick="showHint()">
                    💡 提示
                </button>
                <button class="btn btn-primary" onclick="nextLevel()">
                    ⏭️ 下一关
                </button>
            </div>
        </div>
    </div>
    
    <div class="overlay" id="overlay"></div>
    <div class="message" id="message">
        <h2 id="message-title">🎉 恭喜通关!</h2>
        <p id="message-text">你成功完成了这一关!</p>
        <button class="btn btn-success" onclick="closeMessage()">继续</button>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 10;
        const TOTAL_LEVELS = 50;
        const COLORS = [
            { name: '红色', code: '#FF6B6B', bg: '#FFE5E5' },
            { name: '蓝色', code: '#4ECDC4', bg: '#E5F5F5' },
            { name: '绿色', code: '#95E1D3', bg: '#E5F8F5' },
            { name: '黄色', code: '#FFD93D', bg: '#FFF9E5' },
            { name: '紫色', code: '#C7CEEA', bg: '#F0F0FF' },
            { name: '橙色', code: '#FFA07A', bg: '#FFF0E5' },
            { name: '粉色', code: '#F8B500', bg: '#FFF5E5' },
            { name: '青色', code: '#74B9FF', bg: '#E5F0FF' }
        ];
        
        let currentLevel = 1;
        let board = [];
        let colorRegions = [];
        let solution = [];
        
        // 初始化游戏
        function initGame() {
            loadLevel(currentLevel);
            updateProgress();
        }
        
        // 生成颜色区域
        function generateColorRegions(level) {
            const regions = [];
            const used = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
            
            // 根据关卡难度决定颜色数量
            let numColors = Math.min(4 + Math.floor((level - 1) / 10), 8);
            let targetRegionSize = Math.floor((BOARD_SIZE * BOARD_SIZE) / numColors);
            
            // 生成每个颜色区域
            for (let c = 0; c < numColors; c++) {
                const region = [];
                const size = targetRegionSize + (c < (BOARD_SIZE * BOARD_SIZE) % numColors ? 1 : 0);
                
                // 找到一个起始点
                let startRow, startCol;
                do {
                    startRow = Math.floor(Math.random() * BOARD_SIZE);
                    startCol = Math.floor(Math.random() * BOARD_SIZE);
                } while (used[startRow][startCol]);
                
                region.push({ row: startRow, col: startCol });
                used[startRow][startCol] = true;
                
                // 使用BFS扩展区域
                let queue = [{ row: startRow, col: startCol }];
                while (region.length < size && queue.length > 0) {
                    const current = queue.shift();
                    const neighbors = [
                        { row: current.row - 1, col: current.col },
                        { row: current.row + 1, col: current.col },
                        { row: current.row, col: current.col - 1 },
                        { row: current.row, col: current.col + 1 }
                    ];
                    
                    for (const neighbor of neighbors) {
                        if (neighbor.row >= 0 && neighbor.row < BOARD_SIZE &&
                            neighbor.col >= 0 && neighbor.col < BOARD_SIZE &&
                            !used[neighbor.row][neighbor.col] &&
                            region.length < size) {
                            region.push(neighbor);
                            used[neighbor.row][neighbor.col] = true;
                            queue.push(neighbor);
                        }
                    }
                }
                
                regions.push({
                    color: COLORS[c % COLORS.length],
                    cells: region
                });
            }
            
            // 填充剩余未分配的格子
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (!used[row][col]) {
                        // 找到最近的区域加入
                        let minDist = Infinity;
                        let nearestRegion = 0;
                        for (let i = 0; i < regions.length; i++) {
                            for (const cell of regions[i].cells) {
                                const dist = Math.abs(cell.row - row) + Math.abs(cell.col - col);
                                if (dist < minDist) {
                                    minDist = dist;
                                    nearestRegion = i;
                                }
                            }
                        }
                        regions[nearestRegion].cells.push({ row, col });
                    }
                }
            }
            
            return regions;
        }
        
        // 生成解决方案
        function generateSolution(regions) {
            const solution = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
            
            // 使用回溯算法生成有效解
            const regionOrder = regions.map((r, i) => ({ ...r, index: i }))
                .sort(() => Math.random() - 0.5);
            
            function canPlace(row, col) {
                // 检查行列
                for (let i = 0; i < BOARD_SIZE; i++) {
                    if (solution[row][i] || solution[i][col]) return false;
                }
                // 检查相邻
                const neighbors = [
                    { r: row - 1, c: col }, { r: row + 1, c: col },
                    { r: row, c: col - 1 }, { r: row, c: col + 1 }
                ];
                for (const n of neighbors) {
                    if (n.r >= 0 && n.r < BOARD_SIZE && n.c >= 0 && n.c < BOARD_SIZE &&
                        solution[n.r][n.c]) return false;
                }
                return true;
            }
            
            function solve(regionIdx) {
                if (regionIdx >= regionOrder.length) return true;
                
                const region = regionOrder[regionIdx];
                const cells = region.cells.sort(() => Math.random() - 0.5);
                
                for (const cell of cells) {
                    if (canPlace(cell.row, cell.col)) {
                        solution[cell.row][cell.col] = true;
                        if (solve(regionIdx + 1)) return true;
                        solution[cell.row][cell.col] = false;
                    }
                }
                return false;
            }
            
            solve(0);
            return solution;
        }
        
        // 加载关卡
        function loadLevel(level) {
            currentLevel = level;
            document.getElementById('current-level').textContent = level;
            
            colorRegions = generateColorRegions(level);
            solution = generateSolution(colorRegions);
            
            // 初始化空棋盘
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
            
            renderBoard();
            renderColorLegend();
        }
        
        // 渲染棋盘
        function renderBoard() {
            const boardEl = document.getElementById('game-board');
            boardEl.innerHTML = '';
            
            // 创建颜色映射
            const colorMap = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            for (const region of colorRegions) {
                for (const cell of region.cells) {
                    colorMap[cell.row][cell.col] = region.color;
                }
            }
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    cell.style.backgroundColor = colorMap[row][col].bg;
                    cell.style.border = `2px solid ${colorMap[row][col].code}`;
                    
                    if (board[row][col]) {
                        cell.classList.add('has-cow');
                        cell.innerHTML = '<span class="cow">🐄</span>';
                    }
                    
                    cell.addEventListener('click', () => toggleCow(row, col));
                    boardEl.appendChild(cell);
                }
            }
        }
        
        // 渲染颜色图例
        function renderColorLegend() {
            const legend = document.getElementById('color-legend');
            legend.innerHTML = '';
            
            for (const region of colorRegions) {
                const item = document.createElement('div');
                item.className = 'color-item';
                item.innerHTML = `
                    <div class="color-box" style="background-color: ${region.color.code}"></div>
                    <span>${region.color.name}</span>
                `;
                legend.appendChild(item);
            }
        }
        
        // 切换小牛
        function toggleCow(row, col) {
            const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            
            if (board[row][col]) {
                // 移除小牛
                board[row][col] = false;
                cell.classList.remove('has-cow');
                cell.innerHTML = '';
            } else {
                // 检查是否可以放置
                if (canPlaceCow(row, col)) {
                    board[row][col] = true;
                    cell.classList.add('has-cow');
                    cell.innerHTML = '<span class="cow">🐄</span>';
                    cell.classList.remove('error');
                } else {
                    cell.classList.add('error');
                    setTimeout(() => cell.classList.remove('error'), 500);
                }
            }
        }
        
        // 检查是否可以放置小牛
        function canPlaceCow(row, col) {
            // 检查行列是否已有小牛
            for (let i = 0; i < BOARD_SIZE; i++) {
                if (i !== col && board[row][i]) return false;
                if (i !== row && board[i][col]) return false;
            }
            
            // 检查是否与其他小牛相邻
            const neighbors = [
                { r: row - 1, c: col }, { r: row + 1, c: col },
                { r: row, c: col - 1 }, { r: row, c: col + 1 }
            ];
            for (const n of neighbors) {
                if (n.r >= 0 && n.r < BOARD_SIZE && n.c >= 0 && n.c < BOARD_SIZE &&
                    board[n.r][n.c]) return false;
            }
            
            return true;
        }
        
        // 检查答案
        function checkSolution() {
            let correctCount = 0;
            let errorCount = 0;
            
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (board[row][col]) {
                        if (solution[row][col]) {
                            correctCount++;
                        } else {
                            errorCount++;
                        }
                    }
                }
            }
            
            const totalCows = colorRegions.length;
            
            if (correctCount === totalCows && errorCount === 0) {
                showMessage('🎉 恭喜通关!', '你成功完成了这一关!');
            } else {
                showMessage('❌ 还需努力', `正确: ${correctCount}/${totalCows}, 错误: ${errorCount}`);
            }
        }
        
        // 清空棋盘
        function clearBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(false));
            renderBoard();
        }
        
        // 显示提示
        function showHint() {
            // 找到一个正确但玩家未放置的位置
            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    if (solution[row][col] && !board[row][col]) {
                        const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                        cell.classList.add('hint');
                        setTimeout(() => cell.classList.remove('hint'), 2000);
                        return;
                    }
                }
            }
        }
        
        // 下一关
        function nextLevel() {
            if (currentLevel < TOTAL_LEVELS) {
                loadLevel(currentLevel + 1);
                updateProgress();
            } else {
                showMessage('🏆 游戏通关!', '恭喜你完成了所有50个关卡!');
            }
        }
        
        // 更新进度
        function updateProgress() {
            const progress = (currentLevel / TOTAL_LEVELS) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = `${currentLevel} / ${TOTAL_LEVELS}`;
        }
        
        // 显示消息
        function showMessage(title, text) {
            document.getElementById('message-title').textContent = title;
            document.getElementById('message-text').textContent = text;
            document.getElementById('overlay').classList.add('show');
            document.getElementById('message').classList.add('show');
        }
        
        // 关闭消息
        function closeMessage() {
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('message').classList.remove('show');
        }
        
        // 启动游戏
        initGame();
    </script>
</body>
</html>
